<!DOCTYPE html>
<html>
<head>
    <title>Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>DTR Setup</h2>
    <button onclick="runSetup()" class="btn btn-success">Create Tables & Admin User</button>
    <p id="result" class="mt-3"></p>
    
    <script>
    async function runSetup() {
        document.getElementById('result').innerHTML = "Setting up...";
        
        try {
            const res = await fetch('https://dtr-backend-tvwd.onrender.com/api/setup/init', {
                method: 'POST'
            });
            const data = await res.json();
            document.getElementById('result').innerHTML = data.message;
        } catch (err) {
            document.getElementById('result').innerHTML = "Error: " + err.message;
        }
    }
    </script>
</body>
</html>
